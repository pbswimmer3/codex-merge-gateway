# ============================================================================
#  Merge Gateway — snippet to merge into your ~/.codex/config.toml
#  Do NOT replace your whole config.toml with this file; just add these pieces.
# ============================================================================

# 1) TOP-LEVEL key — point Codex at a catalog that includes your Gateway models.
#    Replace <YOUR-USERNAME> with your macOS username (echo $USER).
model_catalog_json = "/Users/<YOUR-USERNAME>/.codex/model-catalogs/custom.json"


# 2) Provider definition — the Merge Gateway endpoint + which env var holds the key.
#    wire_api = "responses" is Codex's default; the Gateway supports it (including
#    tool calls) at /v1/openai/responses. Do NOT use wire_api = "chat" — recent
#    Codex builds reject it ("wire_api = "chat" is no longer supported").
[model_providers.merge-gateway]
name = "Merge Gateway"
base_url = "https://api-gateway.merge.dev/v1/openai"
env_key = "MERGE_GATEWAY_API_KEY"
wire_api = "responses"
